server:
  port: ${SERVER_PORT:8080}

spring:
  data:
    redis:
      host: ${PROCESS_ENGINE_REDIS_HOST:localhost}
      port: ${PROCESS_ENGINE_REDIS_PORT:6379}
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/process-engine}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

process-engine:
  rabbitmq:
    host: ${PROCESS_ENGINE_RABBITMQ_HOST:localhost}
    port: ${PROCESS_ENGINE_RABBITMQ_PORT:5672}
    username: ${PROCESS_ENGINE_RABBITMQ_USERNAME:guest}
    password: ${PROCESS_ENGINE_RABBITMQ_PASSWORD:guest}
  retry:
    max-attempts: ${PROCESS_ENGINE_RETRY_MAX_ATTEMPTS:3}
    base-interval: ${PROCESS_ENGINE_RETRY_BASE_INTERVAL:5s}
    max-interval: ${PROCESS_ENGINE_RETRY_MAX_INTERVAL:5m}
  security:
    enabled: ${PROCESS_ENGINE_SECURITY_ENABLED:true}
    issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/process-engine}
