services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: process-engine-rabbitmq
    env_file:
      - .env/local.env
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: process-engine-keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8180
    ports:
      - "${KEYCLOAK_PORT:-8180}:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  process-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: process-engine-app
    env_file:
      - .env/local.env
    environment:
      PROCESS_ENGINE_RABBITMQ_HOST: rabbitmq
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/process-engine
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  rabbitmq-data:
  keycloak-data:
