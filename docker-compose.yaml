services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: process-engine-rabbitmq
    env_file:
      - .env/local.env
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: process-engine-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: process-engine-keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8180
    ports:
      - "${KEYCLOAK_PORT:-8180}:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: process-engine-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      process-engine:
        condition: service_started

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: process-engine-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    depends_on:
      - prometheus

  process-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: process-engine-app
    env_file:
      - .env/local.env
    environment:
      PROCESS_ENGINE_RABBITMQ_HOST: rabbitmq
      PROCESS_ENGINE_REDIS_HOST: redis
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/process-engine
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  rabbitmq-data:
  redis-data:
  keycloak-data:
  prometheus-data:
  grafana-storage:
